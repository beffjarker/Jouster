<div class="navigation-container" [class.menu-open]="isMenuOpen">

  <!-- Hamburger Button (Fixed on Left) -->
  <button
    class="hamburger-button"
    type="button"
    (click)="toggleMenu()"
    [attr.aria-expanded]="isMenuOpen"
    aria-label="Toggle navigation menu">
    <span class="hamburger-line" [class.active]="isMenuOpen"></span>
    <span class="hamburger-line" [class.active]="isMenuOpen"></span>
    <span class="hamburger-line" [class.active]="isMenuOpen"></span>
  </button>

  <!-- Navigation Sidebar (Slides in from Left) -->
  <nav
    class="navigation-sidebar"
    [class.open]="isMenuOpen"
    role="navigation"
    aria-label="Main navigation">

    <!-- Header -->
    <div class="nav-header">
      <h2 class="nav-title">Jouster</h2>
      <p class="nav-subtitle">Interactive Platform</p>
    </div>

    <!-- Navigation Menu -->
    <ul class="nav-menu" role="menubar">
      <li
        *ngFor="let item of visibleNavigationItems; trackBy: trackByPath"
        class="nav-item"
        [class.active]="isActiveRoute(item.path)"
        role="none">

        <a
          class="nav-link"
          [routerLink]="item.path"
          role="menuitem"
          [attr.aria-current]="isActiveRoute(item.path) ? 'page' : null"
          (click)="onNavigate(item.path)">

          <span class="nav-icon" aria-hidden="true">{{ item.icon }}</span>

          <div class="nav-content">
            <span class="nav-label">{{ item.label }}</span>
            <span class="nav-description" *ngIf="item.description">{{ item.description }}</span>
          </div>

          <span class="nav-arrow" *ngIf="isActiveRoute(item.path)" aria-hidden="true">→</span>
        </a>
      </li>
    </ul>

    <!-- Footer Info -->
    <div class="nav-footer">
      <button
        class="version-info-trigger"
        type="button"
        (click)="toggleVersionInfo($event)"
        [attr.aria-expanded]="showVersionInfo"
        aria-label="Version information">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="version-label">v{{ appVersion }}</span>
      </button>

      <div class="version-popup" *ngIf="showVersionInfo" role="dialog" aria-label="Version details">
        <div class="version-popup-header">
          <span class="version-popup-title">Jouster</span>
          <button class="version-popup-close" type="button" (click)="toggleVersionInfo($event)" aria-label="Close">×</button>
        </div>
        <dl class="version-popup-list">
          <div class="version-popup-row">
            <dt>Version</dt>
            <dd>{{ appVersion }}</dd>
          </div>
          <div class="version-popup-row">
            <dt>Environment</dt>
            <dd>{{ environmentName }}</dd>
          </div>
          <div class="version-popup-row">
            <dt>Platform</dt>
            <dd>Angular + Nx</dd>
          </div>
          <div class="version-popup-row">
            <dt>Source</dt>
            <dd><code>environment.version</code></dd>
          </div>
        </dl>
      </div>
    </div>
  </nav>

  <!-- Overlay (Mobile Only) -->
  <div
    class="nav-overlay"
    *ngIf="isMobile && isMenuOpen"
    (click)="closeMenu()"
    aria-hidden="true">
  </div>
</div>
