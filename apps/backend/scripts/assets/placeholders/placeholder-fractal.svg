<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f23"/>
  <!-- Mandelbrot-like shape -->
  <g transform="translate(200,150)">
    <ellipse cx="-20" cy="0" rx="60" ry="80" fill="none" stroke="#e74c3c" stroke-width="1.5" opacity="0.5"/>
    <circle cx="30" cy="0" r="25" fill="none" stroke="#e74c3c" stroke-width="1.5" opacity="0.6"/>
    <circle cx="60" cy="0" r="8" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.7"/>
    <circle cx="72" cy="0" r="3" fill="#e74c3c" opacity="0.8"/>
  </g>
  <text x="200" y="270" text-anchor="middle" fill="#e74c3c" font-size="11" font-family="monospace" opacity="0.6">z² + c → ∞</text>
</svg>

