<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f23"/>
  <!-- Sine wave -->
  <path d="M20,150 C60,80 100,80 140,150 C180,220 220,220 260,150 C300,80 340,80 380,150"
        fill="none" stroke="#3498db" stroke-width="2" opacity="0.8"/>
  <!-- Cosine wave -->
  <path d="M20,150 C60,220 100,220 140,150 C180,80 220,80 260,150 C300,220 340,220 380,150"
        fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>
  <text x="200" y="270" text-anchor="middle" fill="#3498db" font-size="11" font-family="monospace" opacity="0.6">sin(θ) + cos(θ)</text>
</svg>

