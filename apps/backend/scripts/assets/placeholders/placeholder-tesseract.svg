<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f23"/>
  <!-- Tesseract wireframe projection -->
  <g transform="translate(200,150)" stroke="#9b59b6" fill="none" stroke-width="1.2" opacity="0.7">
    <!-- Inner cube -->
    <rect x="-30" y="-30" width="60" height="60"/>
    <!-- Outer cube -->
    <rect x="-60" y="-60" width="120" height="120"/>
    <!-- Connecting edges -->
    <line x1="-30" y1="-30" x2="-60" y2="-60"/>
    <line x1="30" y1="-30" x2="60" y2="-60"/>
    <line x1="-30" y1="30" x2="-60" y2="60"/>
    <line x1="30" y1="30" x2="60" y2="60"/>
  </g>
  <text x="200" y="270" text-anchor="middle" fill="#9b59b6" font-size="11" font-family="monospace" opacity="0.6">4D → 3D Projection</text>
</svg>

